name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (typechecks + route generation)
        run: pnpm -C apps/web build
        env:
          DATABASE_URL: postgresql://vayu:vayu@localhost:5432/vayu
          BETTER_AUTH_SECRET: ci-secret-0123456789abcdefghij0123
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - name: Unit tests (vitest)
        run: pnpm -C apps/web test

  ai:
    name: AI (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync --frozen
        working-directory: apps/ai
      - name: Lint (ruff)
        run: uv run ruff check .
        working-directory: apps/ai
      - name: Tests (pytest)
        run: uv run pytest -q
        working-directory: apps/ai

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Real Postgres so the authenticated signup → dashboard journey runs end-to-end.
    # The product schema uses core gen_random_uuid() (PG16) — no extensions needed.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vayu
          POSTGRES_PASSWORD: vayu
          POSTGRES_DB: vayu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vayu -d vayu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://vayu:vayu@localhost:5432/vayu
      BETTER_AUTH_SECRET: e2e-secret-0123456789abcdefghij0123
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply product migrations (Drizzle)
        run: pnpm db:migrate
      - name: Install Playwright browser
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: Build
        run: pnpm -C apps/web build
      - name: E2E (Playwright)
        run: pnpm -C apps/web test:e2e

  # Tests gate the deploy. Fires Render deploy hooks only on a green push to main, and
  # only if the hook secrets exist — so it's a safe no-op until you opt in (set
  # RENDER_DEPLOY_HOOK_WEB / RENDER_DEPLOY_HOOK_AI and turn OFF Render auto-deploy).
  deploy:
    name: Deploy (Render hooks)
    runs-on: ubuntu-latest
    needs: [web, ai, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploys (if configured)
        env:
          WEB_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
          AI_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_AI }}
        run: |
          fired=0
          if [ -n "$WEB_HOOK" ]; then
            curl -fsS -X POST "$WEB_HOOK" >/dev/null && echo "web: deploy queued"; fired=1
          fi
          if [ -n "$AI_HOOK" ]; then
            curl -fsS -X POST "$AI_HOOK" >/dev/null && echo "ai: deploy queued"; fired=1
          fi
          if [ "$fired" = "0" ]; then
            echo "No RENDER_DEPLOY_HOOK_* secrets set — skipping (Render auto-deploy may be on). See docs/DEPLOYMENT.md."
          fi
